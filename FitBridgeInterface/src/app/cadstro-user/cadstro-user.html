<div class="content">
    <h1>Cadastro de Usuário</h1>
    <p class="subtitle">Preencha todos os campos abaixo para criar sua conta</p>

    <div class="role-select">
        <label>
            <input type="radio" name="userType" [(ngModel)]="userType" value="aluno"> Aluno
        </label>
        <label>
            <input type="radio" name="userType" [(ngModel)]="userType" value="professor"> Professor
        </label>
    </div>

    <div *ngIf="erro" class="erro-mensagem" style="color:#d32f2f;background:#fde8e8;padding:10px;border-radius:6px;margin-bottom:12px;text-align:center;">{{ erro }}</div>
    <div *ngIf="sucesso" class="sucesso-mensagem" style="color:#2e7d32;background:#e8f5e9;padding:10px;border-radius:6px;margin-bottom:12px;text-align:center;">{{ sucesso }}</div>

    <form class="registration-form" (ngSubmit)="cadastrar()">
        <!-- Seção de Informações Pessoais -->
        <fieldset class="form-section">
            <legend>Informações Pessoais</legend>

            <div class="form-group">
                <label for="fullname">Seu nome completo:</label>
                <input type="text" id="fullname" name="fullname" [(ngModel)]="nome" placeholder="Digite seu nome completo" required>
            </div>

            <!-- Campos específicos para professor -->
            <div *ngIf="userType === 'professor'" class="form-group">
                <label for="formacao">Formação / Profissão:</label>
                <input type="text" id="formacao" name="formacao" [(ngModel)]="formacao" placeholder="Ex: Educação Física" [required]="userType==='professor'">
            </div>
            <div *ngIf="userType === 'professor'" class="form-group">
                <label for="cref">Registro Profissional (CREF):</label>
                <input type="text" id="cref" name="cref" [(ngModel)]="cref" placeholder="Opcional">
            </div>

            <div class="form-group">
                <label>Dados Físicos:</label>
                <div class="form-row-compact">
                    <div class="form-group-compact">
                        <label for="age">Idade:</label>
                        <input type="number" id="age" name="age" [(ngModel)]="idade" min="0" max="120" placeholder="20" required>
                    </div>
                    <div class="form-group-compact">
                        <label for="weight">Peso (kg):</label>
                        <input type="number" id="weight" name="peso" [(ngModel)]="peso" min="0" step="0.1" placeholder="70" required>
                    </div>
                    <div class="form-group-compact">
                        <label for="gender">Gênero:</label>
                        <select id="gender" name="gender" [(ngModel)]="sexo" required>
                            <option value="" disabled selected>Selecione</option>
                            <option value="masculino">Masculino</option>
                            <option value="feminino">Feminino</option>
                            <option value="outro">Outro</option>
                        </select>
                    </div>
                    <div class="form-group-compact">
                        <label for="height">Altura (cm):</label>
                        <input type="number" id="height" name="height" [(ngModel)]="altura" min="0" placeholder="175" required>
                    </div>
                </div>
            </div>
        </fieldset>

        <!-- Seção de Objetivos (apenas para alunos) -->
        <fieldset *ngIf="userType === 'aluno'" class="form-section">
            <legend>Qual seu objetivo?</legend>

            <div class="checkboxes-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="muscle" name="objectives" value="muscle">
                    <label for="muscle">+ Músculos</label>
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="#8F3A33">
                        <path
                            d="m96-437 39-63 305 286q11 11 25.5 16t31.5 5q11 0 22.5-2.5T543-206l321-202v84L578-144q-17 11-39 17.5t-45 6.5q-29 0-55.5-10.5T391-161L96-437Zm444 173q15 0 25.5-10.5T576-300q0-6-7-21l134-86q5 7 12.5 11t16.5 4q15 0 25.5-10.5T768-428q0-12-6.5-21T744-462v-6q0-15-10.5-25.5T708-504q-15 0-25.5 10.5T672-468q0 5 6 20l-133 86q-5-7-12.5-11t-16.5-4q-15 0-25.5 10.5T480-341q0 12 7 21t18 13q0 2-.5 3.5t-.5 3.5q0 15 10.5 25.5T540-264ZM262-707l38-61q73 32 134 93t95 136q36-40 79.5-63.5T736-649q40-11 71-22t57-25v79q-23 10-49.5 19T747-577q-83 23-123 49.5T549-446q-5 8-13 12t-17 4q-11 0-20.5-7.5T485-456q-26-83-87-152.5T262-707ZM135-500q69 65 152.5 143T440-214q11 11 25.5 16t31.5 5q11 0 22.5-2.5T543-206q72-45 161.5-101T864-408L543-206q-12 8-23.5 10.5T497-193q-17 0-31.5-5T440-214L135-500Z" />
                    </svg>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="weight" name="objectives" value="weight">
                    <label for="weight">- Peso</label>
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="#8F3A33">
                        <path
                            d="M576-276h288v72H576v-72Zm-360 60v-528 528Zm264-504q-50 0-85 35t-35 85q0 50 35 85t85 35q50 0 85-35t35-85q0-50-35-85t-85-35Zm-53 107q5 5 5 13t-5 13q-5 5-13 5t-13-5q-5-5-5-13t5-13q5-5 13-5t13 5Zm66 0q5 5 5 13t-5 13q-5 5-13 5t-13-5q-5-5-5-13t5-13q5-5 13-5t13 5Zm66 0q5 5 5 13t-5 13q-5 5-13 5t-13-5q-5-5-5-13t5-13q5-5 13-5t13 5ZM215.82-144Q186-144 165-165.15T144-216v-528q0-29.7 21.15-50.85Q186.3-816 216-816h528q29.7 0 50.85 21.21Q816-773.58 816-743.8V-455h-71.81v-289H216v528h289v72H215.82Z" />
                    </svg>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="disposition" name="objectives" value="disposition">
                    <label for="disposition">+ Disposição</label>
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="#8F3A33">
                        <path
                            d="M360-108v-474q-74-29-121-95t-47-151h72q0 79.68 56 135.84T456-636h102q21 0 41.5 8.5T635-604l160 160-51 51-144-144v429h-72v-240h-96v240h-72Zm60.5-612.75Q396-745.5 396-780.25t24.75-59.25q24.75-24.5 59.5-24.5t59.25 24.75q24.5 24.75 24.5 59.5t-24.75 59.25Q514.5-696 479.75-696t-59.25-24.75Z" />
                    </svg>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="health" name="objectives" value="health">
                    <label for="health">+ Saúde</label>
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="#8F3A33">
                        <path
                            d="M306.85-816Q356-816 402-795q46 21 78 59 32-38 78-59t95.15-21Q742-816 803-755t61 150.25v9.75q0 5-1 10h-72q1-4.94 1-9.88v-9.87Q792-664 752-704t-99-40q-35 0-65.5 14.5T535-689l-35 41h-40l-35-41q-23-25-54-40t-64-15q-59 0-99 40t-40 99.08v8.42q0 3.5 1 8.5H97q0-5-.5-8.5t-.5-8.25Q96-694 157-755t149.85-61ZM212-373h101q32 32 73 70t94 86q52-47 93.5-85t73.5-70h100q-38 42-92 92.5T528-163l-48 43-50-45q-73-66-126.5-116T212-373Zm221.21 37q10.88 0 18.84-5.5Q460-347 464-357l70-156 35 53.73q5 8.27 13.04 12.27 8.03 4 16.96 4h313v-72H617l-60.19-92.65q-5.24-8.18-13.52-12.26Q535-624 526.05-624q-10.58 0-18.32 6-7.73 6-12.73 16l-70 157-36-55q-5-8-13.04-12-8.03-4-16.96-4H48v72h294l59.8 92.81q5.2 8.19 13.7 11.69t17.71 3.5ZM480-481Z" />
                    </svg>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="conditioning" name="objectives" value="conditioning">
                    <label for="conditioning">+ Vigor</label>
                    <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px"
                        fill="#8F3A33">
                        <path
                            d="m217-168-50-51 381-381h-92v72h-72v-144h223l195 194q23 22 50.5 34t59.5 12v72q-46 0-87.5-17.5T751-427l-79-77-96 96 95 95-251 145-36-62 169-98-87-88-249 248Zm-73-264v-72h192v72H144ZM48-552v-72h192v72H48Zm720-72q-30 0-51-21t-21-51q0-30 21-51t51-21q30 0 51 21t21 51q0 30-21 51t-51 21Zm-624-48v-72h192v72H144Z" />
                    </svg>
                </div>
            </div>
        </fieldset>

        <!-- Seção de Contato e Documentação -->
        <fieldset class="form-section">
            <legend>Contato e Documentação</legend>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="seu.email@example.com" required>
            </div>

            <div *ngIf="userType === 'aluno'" class="form-group">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="123.456.789-00" required>
            </div>
        </fieldset>

        <!-- Seção de Segurança -->
        <fieldset class="form-section">
            <legend>Segurança</legend>

            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" [(ngModel)]="senha" placeholder="Crie uma senha forte" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" [(ngModel)]="confirmarSenha" placeholder="Repita a senha"
                    required>
            </div>
        </fieldset>

        <button type="submit" class="btn-submit" [disabled]="carregando">
            <span *ngIf="!carregando">Cadastrar</span>
            <span *ngIf="carregando">Cadastrando...</span>
        </button>
    </form>

    <p class="signin-link">Já possui conta? <a href="/login">Faça login</a></p>

    <a routerLink="/home" class="btn-home" title="Voltar à página inicial">
        <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#FFFFFF">
            <path
                d="M264-216h96v-240h240v240h96v-348L480-726 264-564v348Zm-72 72v-456l288-216 288 216v456H528v-240h-96v240H192Zm288-327Z" />
        </svg>
    </a>
</div>
