<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h1>FitBridge</h1>
      <p>Login na sua conta</p>
    </div>

    <form (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          placeholder="seu@email.com"
          [disabled]="carregando"
        />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input
          type="password"
          id="senha"
          [(ngModel)]="senha"
          name="senha"
          placeholder="Digite sua senha"
          [disabled]="carregando"
        />
      </div>

      <div *ngIf="erro" class="erro-mensagem">
        {{ erro }}
      </div>

      <button type="submit" class="btn-login" [disabled]="carregando">
        <span *ngIf="!carregando">Entrar</span>
        <span *ngIf="carregando">Carregando...</span>
      </button>
    </form>

    <div class="login-footer">
      <p>Não possui uma conta? <a (click)="criarConta()">Criar conta</a></p>
    </div>
  </div>
</div>
