<div class="content">
    <h1>Cadastro de Profissional</h1>
    <p class="subtitle">Preencha todos os campos abaixo para criar sua conta</p>

    <form class="registration-form">
        <!-- Seção de Informações Pessoais -->
        <fieldset class="form-section">
            <legend>Informações Pessoais</legend>

            <div class="form-group">
                <label for="fullname">Seu nome completo:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Digite seu nome completo" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" placeholder="seu.email@example.com" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Telefone:</label>
                    <input type="tel" id="phone" name="phone" placeholder="(11) 99999-9999" required>
                </div>
                <div class="form-group">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" name="cpf" placeholder="123.456.789-00" required>
                </div>
            </div>

            <div class="form-group">
                <label for="rg">RG:</label>
                <input type="text" id="rg" name="rg" placeholder="12.345.678-9" required>
            </div>
        </fieldset>

        <!-- Seção de Formação Profissional -->
        <fieldset class="form-section">
            <legend>Formação Profissional</legend>

            <div class="form-group">
                <label for="role">Área de atuação/Cargo:</label>
                <input type="text" id="role" name="role" placeholder="Ex: Personal Trainer, Nutricionista" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="training">Formação:</label>
                    <input type="text" id="training" name="training" placeholder="Ex: Educação Física, Nutrição"
                        required>
                </div>
                <div class="form-group">
                    <label for="experience">Anos de experiência:</label>
                    <input type="number" id="experience" name="experience" min="0" placeholder="0" required>
                </div>
            </div>

            <div class="form-group">
                <label for="credential">CREF ou Diploma:</label>
                <input type="text" id="credential" name="credential" placeholder="Número do CREF ou Diploma" required>
            </div>
        </fieldset>

        <!-- Seção de Segurança -->
        <fieldset class="form-section">
            <legend>Segurança</legend>

            <div class="form-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" placeholder="Crie uma senha forte" required>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirmar Senha:</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Repita a senha"
                    required>
            </div>
        </fieldset>

        <button type="submit" class="btn-submit">Cadastrar</button>
    </form>

    <p class="signin-link">Já possui conta? <a href="/login">Faça login</a></p>

    <a routerLink="/home" class="btn-home" title="Voltar à página inicial">
        <svg xmlns="http://www.w3.org/2000/svg" height="20px" viewBox="0 -960 960 960" width="20px" fill="#FFFFFF">
            <path
                d="M264-216h96v-240h240v240h96v-348L480-726 264-564v348Zm-72 72v-456l288-216 288 216v456H528v-240h-96v240H192Zm288-327Z" />
        </svg>
    </a>
</div>
